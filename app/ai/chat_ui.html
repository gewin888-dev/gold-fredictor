<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 黄金分析师 — 独立对话窗口</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;height:100vh;overflow:hidden}
/* sidebar */
#sidebar{width:260px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;flex-shrink:0}
#sidebar h3{padding:16px;font-size:14px;color:#94a3b8;border-bottom:1px solid #334155}
#session-list{flex:1;overflow-y:auto;padding:8px}
.session-item{padding:10px 12px;margin:2px 0;border-radius:6px;cursor:pointer;font-size:13px;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .15s}
.session-item:hover{background:#2d3a4f}
.session-item.active{background:rgba(59,130,246,0.2);color:#60a5fa}
.session-item .count{font-size:11px;color:#64748b;margin-left:6px}
#sidebar-actions{padding:12px;border-top:1px solid #334155;display:flex;gap:6px}
#sidebar-actions button{flex:1;padding:8px;background:#334155;border:none;border-radius:6px;color:#cbd5e1;font-size:12px;cursor:pointer;transition:background .15s}
#sidebar-actions button:hover{background:#475569}
/* main */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#header{padding:12px 20px;background:#1e293b;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#header .title{font-size:15px;font-weight:600}
#header .score-info{font-size:12px;color:#64748b}
#header .score-info span{padding:2px 8px;border-radius:10px;margin-left:6px}
.score-bullish{background:rgba(34,197,94,0.15);color:#4ade80}
.score-bearish{background:rgba(239,68,68,0.15);color:#f87171}
.score-neutral{background:rgba(251,191,36,0.15);color:#fbbf24}
#messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:85%;padding:10px 14px;border-radius:10px;font-size:14px;line-height:1.6;word-wrap:break-word}
.msg.user{align-self:flex-end;background:#2563eb;color:#fff;border-bottom-right-radius:3px}
.msg.assistant{align-self:flex-start;background:#1e293b;border:1px solid #334155;border-bottom-left-radius:3px;color:#cbd5e1}
.msg.assistant p{margin:4px 0}
.msg.assistant strong{color:#fbbf24}
.msg.assistant code{background:#0f172a;padding:2px 6px;border-radius:3px;font-size:13px}
.msg.assistant ul,.msg.assistant ol{margin:4px 0;padding-left:20px}
.msg.assistant li{margin:2px 0}
.msg.assistant h3{font-size:15px;color:#60a5fa;margin:8px 0 4px}
.msg .time{font-size:10px;color:#94a3b8;margin-top:4px}
.msg.user .time{color:rgba(255,255,255,0.6)}
#input-area{padding:12px 20px;background:#1e293b;border-top:1px solid #334155;display:flex;gap:8px;flex-shrink:0}
#input-area input{flex:1;padding:10px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;outline:none;transition:border .15s}
#input-area input:focus{border-color:#3b82f6}
#input-area input::placeholder{color:#475569}
#input-area button{padding:10px 18px;background:#3b82f6;border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer;transition:background .15s;white-space:nowrap}
#input-area button:hover{background:#2563eb}
#input-area button:disabled{background:#334155;cursor:default}
.loading{text-align:center;padding:20px;color:#64748b}
.empty-state{text-align:center;padding:60px 20px;color:#475569}
.empty-state h2{font-size:28px;margin-bottom:12px}
.empty-state p{font-size:14px;line-height:1.8}
.empty-state .hints{margin-top:24px;font-size:13px;color:#64748b}
.empty-state .hints span{display:inline-block;padding:4px 12px;margin:4px;background:#1e293b;border:1px solid #334155;border-radius:12px;cursor:pointer;transition:background .15s}
.empty-state .hints span:hover{background:#2d3a4f}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 20px;background:#ef4444;color:#fff;border-radius:8px;font-size:13px;z-index:999;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="sidebar">
  <h3>📋 对话历史</h3>
  <div id="session-list"><div class="loading">加载中…</div></div>
  <div id="sidebar-actions">
    <button onclick="newSession()">＋ 新对话</button>
    <button onclick="refreshSessions()">🔄 刷新</button>
  </div>
</div>

<div id="main">
  <div id="header">
    <div class="title">🤖 AI 黄金分析师</div>
    <div class="score-info" id="score-badge"></div>
  </div>
  <div id="messages">
    <div class="empty-state">
      <h2>🤖</h2>
      <p>输入地缘事件、宏观变化或系统问题<br>AI 结合实时评分数据给出分析</p>
      <div class="hints">
        <span onclick="quickAsk('中东局势升级，对黄金有何影响？')">🌍 地缘冲突</span>
        <span onclick="quickAsk('美联储降息预期对金价的影响')">🏦 央行政策</span>
        <span onclick="quickAsk('系统数据采集正常吗？帮我诊断')">🔧 系统诊断</span>
      </div>
    </div>
  </div>
  <div id="input-area">
    <input type="text" id="input" placeholder="输入事件或问题…" onkeydown="if(event.key==='Enter') send()">
    <button id="send-btn" onclick="send()">发送</button>
  </div>
</div>

<script>
        // 从 URL ?token=xxx 或 localStorage 读取 API token
        const urlParams = new URLSearchParams(window.location.search);
        let API_TOKEN = urlParams.get('token') || '';
        if (API_TOKEN) {
            localStorage.setItem('api_token', API_TOKEN);
        } else {
            API_TOKEN = localStorage.getItem('api_token') || '';
        }
        if (!API_TOKEN && window.location.hostname === '127.0.0.1') {
            API_TOKEN = 'gold-dash-2026'; // 本地开发默认 token
        }
const API = '/ai/chat';
let currentSession = 'main';
let loading = false;

// Simple markdown-like rendering
function renderMD(text) {
  if (!text) return '';
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/### (.+)/g,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n- /g,'\n<li>')
    .replace(/^- (.+)/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>')
    .replace(/\n/g,'<br>')
    .replace(/`(.+?)`/g,'<code>$1</code>');
  // Fix nested lists
  html = html.replace(/<\/ul><br><ul>/g,'');
  return html;
}

async function api(path, method, body) {
  let controller = new AbortController();
  let timer = setTimeout(() => controller.abort(), 55000); // 55s 超时
  try {
    const headers = {'Content-Type': 'application/json'};
    if (API_TOKEN) {
        headers['Authorization'] = 'Bearer ' + API_TOKEN;
    }
    let opts = {method, headers, signal: controller.signal};
    if (body) opts.body = JSON.stringify(body);
    let r = await fetch(path, opts);
    clearTimeout(timer);
    return await r.json();
  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') return {ok:false, error:'请求超时，AI 服务响应较慢，请稍后重试。'};
    if (e.message === 'Failed to fetch') return {ok:false, error:'网络连接失败，请检查服务是否运行。'};
    return {ok:false, error:'连接异常：' + e.message};
  }
}

function scrollBottom() {
  let el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function addMsg(role, content) {
  let msgs = document.getElementById('messages');
  // Remove empty state
  let empty = msgs.querySelector('.empty-state');
  if (empty) empty.remove();

  let div = document.createElement('div');
  div.className = 'msg ' + role;
  let now = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  div.innerHTML = (role==='assistant' ? renderMD(content) : content) + `<div class="time">${now}</div>`;
  msgs.appendChild(div);
  scrollBottom();
}

function setLoading(v) {
  loading = v;
  document.getElementById('send-btn').disabled = v;
  document.getElementById('input').disabled = v;
}

async function send() {
  if (loading) return;
  let input = document.getElementById('input');
  let msg = input.value.trim();
  if (!msg) return;

  addMsg('user', msg);
  input.value = '';
  setLoading(true);

  let resp = await api(API, 'POST', {message:msg, session_id:currentSession});
  setLoading(false);

  if (resp.ok) {
    addMsg('assistant', resp.reply);
    if (resp.score_total != null && resp.score_direction) {
      updateBadge(resp.score_total, resp.score_direction);
    }
  } else {
    addMsg('assistant', '❌ ' + (resp.reply || resp.error || '请求失败'));
  }
  refreshSessions();
}

async function loadSession(sid) {
  currentSession = sid;
  document.getElementById('messages').innerHTML = '<div class="loading">加载中…</div>';

  let resp = await api('/ai/chat/archive/' + sid, 'GET');
  document.getElementById('messages').innerHTML = '';

  if (resp.ok && resp.messages && resp.messages.length > 0) {
    resp.messages.forEach(m => addMsg(m.role, m.content));
  } else {
    document.getElementById('messages').innerHTML = `<div class="empty-state">
      <h2>🤖</h2><p>新对话已就绪</p>
      <div class="hints">
        <span onclick="quickAsk('中东局势升级，对黄金有何影响？')">🌍 地缘冲突</span>
        <span onclick="quickAsk('美联储降息预期对金价的影响')">🏦 央行政策</span>
        <span onclick="quickAsk('系统数据采集正常吗？帮我诊断')">🔧 系统诊断</span>
      </div></div>`;
  }
  updateSessionHighlight();
  getScoreBadge();
}

function getScoreBadge() {
  const headers = {'Content-Type': 'application/json'};
  if (API_TOKEN) {
      headers['Authorization'] = 'Bearer ' + API_TOKEN;
  }
  fetch('/ai/analysis', {headers}).then(r=>r.json()).then(d=>{
    if (d.ok && d.score_total != null) {
      updateBadge(d.score_total, d.score_direction);
    }
  }).catch(()=>{});
}

function updateBadge(score, direction) {
  let badge = document.getElementById('score-badge');
  let cls = 'score-neutral';
  if (score >= 30) cls = 'score-bullish';
  else if (score <= -30) cls = 'score-bearish';
  badge.innerHTML = `评分 <span class="${cls}">${score >= 0 ? '+' : ''}${score.toFixed(1)} · ${direction}</span>`;
}

async function refreshSessions() {
  let resp = await api('/ai/chat/archive', 'GET');
  let list = document.getElementById('session-list');
  if (!resp.ok || !resp.sessions) {
    list.innerHTML = '<div class="loading">加载失败</div>';
    return;
  }
  list.innerHTML = resp.sessions.map(s => {
    let active = s.session_id === currentSession ? ' active' : '';
    let title = (s.title || '新对话').substring(0, 20);
    return `<div class="session-item${active}" onclick="loadSession('${s.session_id}')" title="${s.title || ''}">
      ${title}<span class="count">${s.message_count || 0}条</span>
    </div>`;
  }).join('') || '<div style="color:#64748b;padding:8px;font-size:13px">暂无对话记录</div>';
  updateSessionHighlight();
}

function updateSessionHighlight() {
  document.querySelectorAll('.session-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick')?.includes(currentSession));
  });
}

function newSession() {
  let sid = 'sess_' + Date.now();
  currentSession = sid;
  document.getElementById('messages').innerHTML = `<div class="empty-state">
    <h2>🤖</h2><p>新对话已就绪</p>
    <div class="hints">
      <span onclick="quickAsk('中东局势升级，对黄金有何影响？')">🌍 地缘冲突</span>
      <span onclick="quickAsk('美联储降息预期对金价的影响')">🏦 央行政策</span>
      <span onclick="quickAsk('系统数据采集正常吗？帮我诊断')">🔧 系统诊断</span>
    </div></div>`;
  refreshSessions();
}

function quickAsk(msg) {
  document.getElementById('input').value = msg;
  send();
}

// Init
refreshSessions();
getScoreBadge();
document.getElementById('input').focus();
</script>
</body>
</html>
